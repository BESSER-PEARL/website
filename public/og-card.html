<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@600;700&display=swap" rel="stylesheet" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Inter', system-ui, sans-serif; }
    #card {
      position: relative;
      width: 1200px;
      height: 630px;
      overflow: hidden;
      background:
        linear-gradient(to bottom, #ffffff 0%, #ffffff 55%, #eef6ff 100%);
      padding: 72px 80px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
    }
    /* faint blueprint grid, like the hero */
    #card::before {
      content: '';
      position: absolute; inset: 0;
      background-image:
        linear-gradient(to right, rgba(15,23,42,0.04) 1px, transparent 1px),
        linear-gradient(to bottom, rgba(15,23,42,0.04) 1px, transparent 1px);
      background-size: 56px 56px;
    }
    /* brand blob */
    #card::after {
      content: '';
      position: absolute;
      top: -160px; right: -120px;
      width: 560px; height: 460px;
      border-radius: 9999px;
      background: radial-gradient(closest-side, rgba(59,130,246,0.30), rgba(96,165,250,0.12), transparent);
      filter: blur(40px);
    }
    .row { position: relative; z-index: 1; }
    .logo { height: 56px; width: auto; }
    h1 {
      font-family: 'Space Grotesk', sans-serif;
      font-weight: 700;
      font-size: 92px;
      line-height: 1.02;
      letter-spacing: -0.02em;
      color: #0f172a;
    }
    .grad {
      background: linear-gradient(135deg, #3b82f6, #1d4ed8);
      -webkit-background-clip: text; background-clip: text; color: transparent;
    }
    p.sub {
      margin-top: 24px;
      font-size: 30px;
      line-height: 1.4;
      color: #475569;
      max-width: 900px;
    }
    .foot {
      display: flex; align-items: center; gap: 16px;
      font-size: 24px; color: #64748b; font-weight: 500;
    }
    .pill {
      display: inline-flex; align-items: center;
      border: 1px solid rgba(191,219,254,0.9);
      background: rgba(238,246,255,0.7);
      color: #1d4ed8;
      border-radius: 9999px;
      padding: 6px 16px;
      font-size: 20px; font-weight: 600;
      letter-spacing: 0.08em; text-transform: uppercase;
    }
    .dot { width: 6px; height: 6px; border-radius: 9999px; background: #cbd5e1; }
  </style>
</head>
<body>
  <div id="card">
    <div class="row"><img class="logo" src="brand/besser_logo.webp" alt="BESSER" /></div>
    <div class="row">
      <h1>Better software,<br /><span class="grad">faster.</span></h1>
      <p class="sub">The open-source, AI-powered low-code platform. Model once — generate APIs, databases, agents, and full deployments.</p>
    </div>
    <div class="row foot">
      <span class="pill">Open source</span>
      <span class="dot"></span>
      <span>besser-pearl.org</span>
    </div>
  </div>
</body>
</html>
