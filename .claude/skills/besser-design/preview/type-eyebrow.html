<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Eyebrow & Gradient Accent</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;}
  body{width:700px;min-height:150px;box-sizing:border-box;padding:26px 28px;background:#fff;color:var(--fg1);}
  .row{display:flex;}
  .lbl{font-family:var(--font-mono);font-size:11px;color:var(--fg3);}
  
</style>
</head>
<body>

<div style="display:flex;flex-direction:column;gap:18px;">
  <div><div class="lbl">Eyebrow pill · 11/600 · uppercase · 0.12em</div>
    <div style="margin-top:8px;"><span class="ds-eyebrow">What BESSER gives you</span></div></div>
  <div><div class="lbl">Gradient stat number · Space Grotesk 700</div>
    <div style="display:flex;gap:28px;margin-top:4px;">
      <span class="ds-gradient-text" style="font-family:var(--font-display);font-weight:700;font-size:48px;letter-spacing:-0.02em;">15+</span>
      <span class="ds-gradient-text" style="font-family:var(--font-display);font-weight:700;font-size:48px;letter-spacing:-0.02em;">31</span>
      <span class="ds-gradient-text" style="font-family:var(--font-display);font-weight:700;font-size:48px;letter-spacing:-0.02em;">23</span>
    </div></div>
</div>
</body>
</html>
