<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Dropdown Menu</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>html,body{margin:0;}body{width:700px;min-height:200px;box-sizing:border-box;padding:0;background:#fff;color:var(--fg1);font-family:var(--font-sans);}
.pad{padding:26px 28px;}
.lbl{font-family:var(--font-mono);font-size:11px;color:var(--fg3);margin-bottom:14px;}
</style>
<script src="https://unpkg.com/lucide@0.288.0/dist/umd/lucide.min.js"></script></head><body>
<div class="pad"><div class="lbl">Nav dropdown — rounded-xl white card, label + desc rows</div>
<div style="width:256px;border-radius:12px;border:1px solid rgba(226,232,240,0.8);background:#fff;padding:8px;box-shadow:var(--shadow-menu);">
  
  <a style="display:block;border-radius:8px;padding:8px 12px;text-decoration:none;background:var(--brand-50);">
    <div style="font-size:14px;font-weight:500;color:var(--brand-700);">Publications</div>
    <div style="font-size:12px;color:var(--ink-500);">Peer-reviewed papers</div></a>
  <a style="display:block;border-radius:8px;padding:8px 12px;text-decoration:none;">
    <div style="font-size:14px;font-weight:500;color:var(--ink-700);">Projects</div>
    <div style="font-size:12px;color:var(--ink-500);">Active research initiatives</div></a>
</div></div>
<script>lucide.createIcons();</script></body></html>
