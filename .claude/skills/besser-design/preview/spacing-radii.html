<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Corner Radii</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>html,body{margin:0;}body{width:700px;min-height:170px;box-sizing:border-box;padding:26px 28px;background:#fff;color:var(--fg1);font-family:var(--font-sans);}
.lbl{font-family:var(--font-mono);font-size:11px;color:var(--fg3);}
</style></head><body>
<div class="lbl">Radii — chips/inputs xl · cards 2xl · banners 3xl · pills full</div>
<div style="margin-top:16px;display:flex;gap:20px;align-items:flex-end;">
  <div style="text-align:center;">
    <div style="width:84px;height:64px;background:var(--brand-50);border:1px solid var(--border-accent);border-radius:0.5rem;"></div>
    <div style="font-family:var(--font-mono);font-size:11px;margin-top:8px;color:var(--fg1);">sm</div>
    <div style="font-family:var(--font-mono);font-size:10px;color:var(--fg3);">8px</div></div><div style="text-align:center;">
    <div style="width:84px;height:64px;background:var(--brand-50);border:1px solid var(--border-accent);border-radius:0.75-1rem;"></div>
    <div style="font-family:var(--font-mono);font-size:11px;margin-top:8px;color:var(--fg1);">md/xl</div>
    <div style="font-family:var(--font-mono);font-size:10px;color:var(--fg3);">12-16px</div></div><div style="text-align:center;">
    <div style="width:84px;height:64px;background:var(--brand-50);border:1px solid var(--border-accent);border-radius:1rem;"></div>
    <div style="font-family:var(--font-mono);font-size:11px;margin-top:8px;color:var(--fg1);">2xl</div>
    <div style="font-family:var(--font-mono);font-size:10px;color:var(--fg3);">16px</div></div><div style="text-align:center;">
    <div style="width:84px;height:64px;background:var(--brand-50);border:1px solid var(--border-accent);border-radius:1.5rem;"></div>
    <div style="font-family:var(--font-mono);font-size:11px;margin-top:8px;color:var(--fg1);">3xl</div>
    <div style="font-family:var(--font-mono);font-size:10px;color:var(--fg3);">24px</div></div><div style="text-align:center;">
    <div style="width:84px;height:64px;background:var(--brand-50);border:1px solid var(--border-accent);border-radius:9999px;"></div>
    <div style="font-family:var(--font-mono);font-size:11px;margin-top:8px;color:var(--fg1);">full</div>
    <div style="font-family:var(--font-mono);font-size:10px;color:var(--fg3);">pill</div></div>
</div></body></html>
