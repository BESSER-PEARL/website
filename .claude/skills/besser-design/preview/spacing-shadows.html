<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Elevation / Shadows</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>html,body{margin:0;}body{width:700px;min-height:220px;box-sizing:border-box;padding:26px 28px;background:#fff;color:var(--fg1);font-family:var(--font-sans);}
.lbl{font-family:var(--font-mono);font-size:11px;color:var(--fg3);}
</style></head><body>
<div class="lbl">Shadow system — soft, large, diffuse · brand-tinted on hover</div>
<div style="margin-top:18px;display:grid;grid-template-columns:1fr 1fr 1fr;gap:22px;">
  <div style="text-align:center;">
    <div style="height:72px;background:#fff;border:1px solid var(--border);border-radius:16px;box-shadow:0 8px 30px -6px rgba(15,23,42,.08);"></div>
    <div style="font-family:var(--font-mono);font-size:11px;margin-top:14px;color:var(--fg1);">soft</div>
    <div style="font-size:11px;color:var(--fg3);margin-top:2px;">default card</div></div><div style="text-align:center;">
    <div style="height:72px;background:#fff;border:1px solid var(--border);border-radius:16px;box-shadow:0 24px 60px -18px rgba(37,99,235,.25);"></div>
    <div style="font-family:var(--font-mono);font-size:11px;margin-top:14px;color:var(--fg1);">card-hover</div>
    <div style="font-size:11px;color:var(--fg3);margin-top:2px;">brand-tinted</div></div><div style="text-align:center;">
    <div style="height:72px;background:#fff;border:1px solid var(--border);border-radius:16px;box-shadow:0 30px 80px -20px rgba(15,23,42,.35);"></div>
    <div style="font-family:var(--font-mono);font-size:11px;margin-top:14px;color:var(--fg1);">screen</div>
    <div style="font-size:11px;color:var(--fg3);margin-top:2px;">product frame</div></div>
</div></body></html>
