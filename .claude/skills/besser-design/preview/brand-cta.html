<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>CTA Banner</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>html,body{margin:0;}body{width:700px;min-height:190px;box-sizing:border-box;padding:26px 28px;background:#fff;color:var(--fg1);font-family:var(--font-sans);}
.lbl{font-family:var(--font-mono);font-size:11px;color:var(--fg3);margin-bottom:14px;}
</style>
<script src="https://unpkg.com/lucide@0.288.0/dist/umd/lucide.min.js"></script></head><body>
<div class="lbl">CTA banner — rounded-3xl, brand-tinted gradient + blurred halo</div>
<div style="position:relative;overflow:hidden;border-radius:24px;border:1px solid rgba(191,219,254,0.5);background:linear-gradient(135deg,var(--brand-50),#fff,var(--brand-50));padding:28px 30px;">
  <div style="position:absolute;right:-40px;top:-40px;height:160px;width:160px;border-radius:9999px;background:rgba(191,219,254,0.4);filter:blur(50px);"></div>
  <div style="position:relative;">
    <h2 style="margin:0;font-family:var(--font-display);font-size:26px;font-weight:700;letter-spacing:-0.02em;color:var(--ink-900);">Wondering whether BESSER is right for you?</h2>
    <p style="margin:8px 0 0;font-size:14px;color:var(--ink-600);max-width:440px;">Open the editor and try it in your browser, or talk to us.</p>
    <div style="display:flex;gap:12px;margin-top:18px;">
      <a style="display:inline-flex;align-items:center;gap:8px;background:var(--brand-600);color:#fff;padding:11px 18px;border-radius:14px;font-size:14px;font-weight:600;text-decoration:none;box-shadow:var(--shadow-soft);"><i data-lucide="play-circle" style="width:16px;height:16px;"></i>Try BESSER</a>
      <a style="display:inline-flex;align-items:center;background:#fff;color:var(--ink-700);padding:11px 18px;border-radius:14px;font-size:14px;font-weight:600;border:1px solid var(--ink-200);text-decoration:none;">Let’s chat</a>
    </div>
  </div>
</div><script>lucide.createIcons();</script></body></html>
