<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Semantic Roles</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>html,body{margin:0;}body{width:700px;min-height:240px;box-sizing:border-box;padding:26px 28px;background:#fff;color:var(--fg1);font-family:var(--font-sans);}
.lbl{font-family:var(--font-mono);font-size:11px;color:var(--fg3);}
.scale{display:flex;border-radius:12px;overflow:hidden;box-shadow:var(--shadow-ring);}
.sw{flex:1;height:64px;display:flex;align-items:flex-end;justify-content:center;padding-bottom:6px;font-family:var(--font-mono);font-size:10px;}
</style></head><body>
<div class="lbl">Applied color roles</div>
<div style="margin-top:12px;display:grid;grid-template-columns:1fr 1fr;gap:10px;">
  <div style="background:#2563eb;color:#fff;border:1px solid var(--border);border-radius:12px;padding:12px 14px;">
    <div style="font-weight:600;font-size:13px;">Primary action</div>
    <div style="font-family:var(--font-mono);font-size:10px;opacity:.8;margin-top:3px;">brand-600</div></div><div style="background:#1d4ed8;color:#fff;border:1px solid var(--border);border-radius:12px;padding:12px 14px;">
    <div style="font-weight:600;font-size:13px;">Primary hover</div>
    <div style="font-family:var(--font-mono);font-size:10px;opacity:.8;margin-top:3px;">brand-700</div></div><div style="background:#eef6ff;color:#1d4ed8;border:1px solid var(--border);border-radius:12px;padding:12px 14px;">
    <div style="font-weight:600;font-size:13px;">Soft accent bg</div>
    <div style="font-family:var(--font-mono);font-size:10px;opacity:.8;margin-top:3px;">brand-50 / 700</div></div><div style="background:#0f172a;color:#fff;border:1px solid var(--border);border-radius:12px;padding:12px 14px;">
    <div style="font-weight:600;font-size:13px;">Heading fg1</div>
    <div style="font-family:var(--font-mono);font-size:10px;opacity:.8;margin-top:3px;">ink-900</div></div><div style="background:#475569;color:#fff;border:1px solid var(--border);border-radius:12px;padding:12px 14px;">
    <div style="font-weight:600;font-size:13px;">Body fg2</div>
    <div style="font-family:var(--font-mono);font-size:10px;opacity:.8;margin-top:3px;">ink-600</div></div><div style="background:#64748b;color:#fff;border:1px solid var(--border);border-radius:12px;padding:12px 14px;">
    <div style="font-weight:600;font-size:13px;">Caption fg3</div>
    <div style="font-family:var(--font-mono);font-size:10px;opacity:.8;margin-top:3px;">ink-500</div></div><div style="background:#f8fafc;color:#334155;border:1px solid var(--border);border-radius:12px;padding:12px 14px;">
    <div style="font-weight:600;font-size:13px;">Subtle band</div>
    <div style="font-family:var(--font-mono);font-size:10px;opacity:.8;margin-top:3px;">ink-50</div></div><div style="background:#dbeafe;color:#1e3a8a;border:1px solid var(--border);border-radius:12px;padding:12px 14px;">
    <div style="font-weight:600;font-size:13px;">Selection</div>
    <div style="font-family:var(--font-mono);font-size:10px;opacity:.8;margin-top:3px;">brand-100/900</div></div>
</div></body></html>
