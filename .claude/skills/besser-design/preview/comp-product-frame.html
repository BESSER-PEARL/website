<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Product Window Frame</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>html,body{margin:0;}body{width:700px;min-height:220px;box-sizing:border-box;padding:0;background:#fff;color:var(--fg1);font-family:var(--font-sans);}
.pad{padding:26px 28px;}
.lbl{font-family:var(--font-mono);font-size:11px;color:var(--fg3);margin-bottom:14px;}
</style>
<script src="https://unpkg.com/lucide@0.288.0/dist/umd/lucide.min.js"></script></head><body>
<div class="pad"><div class="lbl">Browser-chrome mock — traffic lights + mono URL · dark ink-900 body</div>
<div style="border-radius:16px;overflow:hidden;border:1px solid var(--ink-200);background:var(--ink-900);box-shadow:0 24px 60px -24px rgba(15,23,42,0.35);">
  <div style="display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid rgba(255,255,255,0.05);background:rgba(15,23,42,0.7);padding:10px 14px;">
    <div style="display:flex;gap:6px;">
      <span style="height:10px;width:10px;border-radius:9999px;background:rgba(248,113,113,0.8);"></span>
      <span style="height:10px;width:10px;border-radius:9999px;background:rgba(251,191,36,0.8);"></span>
      <span style="height:10px;width:10px;border-radius:9999px;background:rgba(52,211,153,0.8);"></span>
    </div>
    <div style="font-family:var(--font-mono);font-size:11px;color:rgba(255,255,255,0.5);">editor.besser-pearl.org</div>
    <div style="width:48px;"></div>
  </div>
  <div style="height:120px;background:linear-gradient(135deg,#0f172a,#1e293b);display:grid;place-items:center;">
    <span style="font-family:var(--font-mono);font-size:12px;color:rgba(255,255,255,0.4);">model · generate · deploy</span>
  </div>
</div></div>
<script>lucide.createIcons();</script></body></html>
