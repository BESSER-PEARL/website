<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Footer</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>html,body{margin:0;}body{width:700px;min-height:230px;box-sizing:border-box;padding:0;background:#fff;color:var(--fg1);font-family:var(--font-sans);}
.pad{padding:26px 28px;}
.lbl{font-family:var(--font-mono);font-size:11px;color:var(--fg3);margin-bottom:14px;}
</style>
<script src="https://unpkg.com/lucide@0.288.0/dist/umd/lucide.min.js"></script></head><body>
<div style="border-top:1px solid var(--ink-200);background:rgba(248,250,252,0.6);padding:28px;">
  <div style="display:grid;grid-template-columns:1.4fr 1fr 1fr;gap:24px;">
    <div>
      <img src="../assets/besser_logo.webp" style="height:30px;width:auto;" alt="BESSER">
      <p style="margin:14px 0 0;font-size:13px;color:var(--ink-600);max-width:230px;line-height:1.5;">An open-source low-code platform for building smart, AI-enhanced applications faster.</p>
      <div style="display:flex;gap:6px;margin-top:14px;">
        <a style="padding:8px;border-radius:8px;color:var(--ink-600);"><i data-lucide="github" style="width:18px;height:18px;"></i></a><a style="padding:8px;border-radius:8px;color:var(--ink-600);"><i data-lucide="linkedin" style="width:18px;height:18px;"></i></a><a style="padding:8px;border-radius:8px;color:var(--ink-600);"><i data-lucide="youtube" style="width:18px;height:18px;"></i></a>
      </div>
    </div>
    
    <div><h4 style="font-family:var(--font-display);font-size:13px;font-weight:600;text-transform:uppercase;letter-spacing:0.06em;color:var(--ink-900);margin:0;">Product</h4>
    <ul style="list-style:none;padding:0;margin:14px 0 0;display:flex;flex-direction:column;gap:8px;"><li><a style="font-size:13px;color:var(--ink-600);text-decoration:none;">Features</a></li><li><a style="font-size:13px;color:var(--ink-600);text-decoration:none;">Services</a></li><li><a style="font-size:13px;color:var(--ink-600);text-decoration:none;">Online editor</a></li><li><a style="font-size:13px;color:var(--ink-600);text-decoration:none;">Documentation</a></li></ul></div>
    <div><h4 style="font-family:var(--font-display);font-size:13px;font-weight:600;text-transform:uppercase;letter-spacing:0.06em;color:var(--ink-900);margin:0;">Resources</h4>
    <ul style="list-style:none;padding:0;margin:14px 0 0;display:flex;flex-direction:column;gap:8px;"><li><a style="font-size:13px;color:var(--ink-600);text-decoration:none;">Blog</a></li><li><a style="font-size:13px;color:var(--ink-600);text-decoration:none;">Low-code Handbook</a></li><li><a style="font-size:13px;color:var(--ink-600);text-decoration:none;">Research</a></li></ul></div>
  </div>
</div>
<script>lucide.createIcons();</script></body></html>
