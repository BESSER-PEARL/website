<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Spacing Scale</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>html,body{margin:0;}body{width:700px;min-height:180px;box-sizing:border-box;padding:26px 28px;background:#fff;color:var(--fg1);font-family:var(--font-sans);}
.lbl{font-family:var(--font-mono);font-size:11px;color:var(--fg3);}
</style></head><body>
<div class="lbl">4px base · sections py-20/24 · gaps 5 (20px) common</div>
<div style="margin-top:16px;display:flex;flex-direction:column;gap:10px;">
  <div style="display:flex;align-items:center;gap:14px;">
    <div style="width:42px;font-family:var(--font-mono);font-size:11px;color:var(--fg3);">1 <span style="opacity:.6">4</span></div>
    <div style="height:14px;width:4px;background:var(--brand-400);border-radius:3px;"></div></div><div style="display:flex;align-items:center;gap:14px;">
    <div style="width:42px;font-family:var(--font-mono);font-size:11px;color:var(--fg3);">2 <span style="opacity:.6">8</span></div>
    <div style="height:14px;width:8px;background:var(--brand-400);border-radius:3px;"></div></div><div style="display:flex;align-items:center;gap:14px;">
    <div style="width:42px;font-family:var(--font-mono);font-size:11px;color:var(--fg3);">3 <span style="opacity:.6">12</span></div>
    <div style="height:14px;width:12px;background:var(--brand-400);border-radius:3px;"></div></div><div style="display:flex;align-items:center;gap:14px;">
    <div style="width:42px;font-family:var(--font-mono);font-size:11px;color:var(--fg3);">4 <span style="opacity:.6">16</span></div>
    <div style="height:14px;width:16px;background:var(--brand-400);border-radius:3px;"></div></div><div style="display:flex;align-items:center;gap:14px;">
    <div style="width:42px;font-family:var(--font-mono);font-size:11px;color:var(--fg3);">5 <span style="opacity:.6">20</span></div>
    <div style="height:14px;width:20px;background:var(--brand-400);border-radius:3px;"></div></div><div style="display:flex;align-items:center;gap:14px;">
    <div style="width:42px;font-family:var(--font-mono);font-size:11px;color:var(--fg3);">6 <span style="opacity:.6">24</span></div>
    <div style="height:14px;width:24px;background:var(--brand-400);border-radius:3px;"></div></div><div style="display:flex;align-items:center;gap:14px;">
    <div style="width:42px;font-family:var(--font-mono);font-size:11px;color:var(--fg3);">8 <span style="opacity:.6">32</span></div>
    <div style="height:14px;width:32px;background:var(--brand-400);border-radius:3px;"></div></div><div style="display:flex;align-items:center;gap:14px;">
    <div style="width:42px;font-family:var(--font-mono);font-size:11px;color:var(--fg3);">12 <span style="opacity:.6">48</span></div>
    <div style="height:14px;width:48px;background:var(--brand-400);border-radius:3px;"></div></div><div style="display:flex;align-items:center;gap:14px;">
    <div style="width:42px;font-family:var(--font-mono);font-size:11px;color:var(--fg3);">16 <span style="opacity:.6">64</span></div>
    <div style="height:14px;width:64px;background:var(--brand-400);border-radius:3px;"></div></div><div style="display:flex;align-items:center;gap:14px;">
    <div style="width:42px;font-family:var(--font-mono);font-size:11px;color:var(--fg3);">24 <span style="opacity:.6">96</span></div>
    <div style="height:14px;width:96px;background:var(--brand-400);border-radius:3px;"></div></div>
</div></body></html>
