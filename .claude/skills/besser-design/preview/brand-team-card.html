<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Team Card</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>html,body{margin:0;}body{width:700px;min-height:260px;box-sizing:border-box;padding:26px 28px;background:#fff;color:var(--fg1);font-family:var(--font-sans);}
.lbl{font-family:var(--font-mono);font-size:11px;color:var(--fg3);margin-bottom:14px;}
</style>
<script src="https://unpkg.com/lucide@0.288.0/dist/umd/lucide.min.js"></script></head><body>
<div class="lbl">Team headshot card — 4/5 image, hover zoom, name + Profile link</div>
<div style="display:flex;gap:16px;">
  <div style="width:150px;border-radius:16px;border:1px solid var(--border);background:#fff;box-shadow:var(--shadow-soft);overflow:hidden;">
    <div style="aspect-ratio:4/5;background:var(--ink-100);overflow:hidden;"><img src="../assets/team/Jordi-1.jpg" style="width:100%;height:100%;object-fit:cover;object-position:top;" alt="Jordi Cabot"></div>
    <div style="padding:12px 14px;">
      <div style="font-family:var(--font-display);font-size:13px;font-weight:600;color:var(--ink-900);">Jordi Cabot</div>
      <div style="margin-top:4px;display:inline-flex;align-items:center;gap:4px;font-size:11px;color:var(--ink-500);">Profile <i data-lucide="external-link" style="width:11px;height:11px;"></i></div>
    </div></div><div style="width:150px;border-radius:16px;border:1px solid var(--border);background:#fff;box-shadow:var(--shadow-soft);overflow:hidden;">
    <div style="aspect-ratio:4/5;background:var(--ink-100);overflow:hidden;"><img src="../assets/team/SULEJMANI_Armen_2024_www.jpg" style="width:100%;height:100%;object-fit:cover;object-position:top;" alt="Armen Sulejmani"></div>
    <div style="padding:12px 14px;">
      <div style="font-family:var(--font-display);font-size:13px;font-weight:600;color:var(--ink-900);">Armen Sulejmani</div>
      <div style="margin-top:4px;display:inline-flex;align-items:center;gap:4px;font-size:11px;color:var(--ink-500);">Profile <i data-lucide="external-link" style="width:11px;height:11px;"></i></div>
    </div></div><div style="width:150px;border-radius:16px;border:1px solid var(--border);background:#fff;box-shadow:var(--shadow-soft);overflow:hidden;">
    <div style="aspect-ratio:4/5;background:var(--ink-100);overflow:hidden;"><img src="../assets/team/CONRARDY_Aaron_2024_www.jpg" style="width:100%;height:100%;object-fit:cover;object-position:top;" alt="Aaron Conrardy"></div>
    <div style="padding:12px 14px;">
      <div style="font-family:var(--font-display);font-size:13px;font-weight:600;color:var(--ink-900);">Aaron Conrardy</div>
      <div style="margin-top:4px;display:inline-flex;align-items:center;gap:4px;font-size:11px;color:var(--ink-500);">Profile <i data-lucide="external-link" style="width:11px;height:11px;"></i></div>
    </div></div>
</div><script>lucide.createIcons();</script></body></html>
