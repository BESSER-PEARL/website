<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Monospace</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;}
  body{width:700px;min-height:170px;box-sizing:border-box;padding:26px 28px;background:#fff;color:var(--fg1);}
  .row{display:flex;}
  .lbl{font-family:var(--font-mono);font-size:11px;color:var(--fg3);}
  
</style>
</head>
<body>

<div style="display:flex;flex-direction:column;gap:14px;">
  <div class="lbl">JetBrains Mono · code, URLs, email</div>
  <div style="font-family:var(--font-mono);font-size:13px;color:rgba(255,255,255,0.55);background:var(--ink-900);padding:10px 14px;border-radius:10px;width:fit-content;">editor.besser-pearl.org</div>
  <div style="font-family:var(--font-mono);font-size:14px;color:var(--fg1);">contact@besser-pearl.org</div>
  <div style="font-family:var(--font-mono);font-size:13px;color:var(--accent);">pip install besser</div>
</div>
</body>
</html>
