<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Stat Strip</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>html,body{margin:0;}body{width:700px;min-height:130px;box-sizing:border-box;padding:26px 28px;background:#fff;color:var(--fg1);font-family:var(--font-sans);}
.lbl{font-family:var(--font-mono);font-size:11px;color:var(--fg3);margin-bottom:14px;}
.btn{display:inline-flex;align-items:center;gap:8px;border-radius:14px;font-size:14px;font-weight:600;cursor:pointer;transition:all .2s var(--ease-out);text-decoration:none;}
.btn svg{width:16px;height:16px;}
.btn-primary{background:var(--brand-600);color:#fff;padding:12px 20px;box-shadow:var(--shadow-soft);border:none;}
.btn-primary:hover{background:var(--brand-700);transform:translateY(-2px);}
.btn-secondary{background:#fff;color:var(--ink-700);padding:12px 20px;border:1px solid var(--ink-200);}
.btn-secondary:hover{border-color:var(--ink-300);background:var(--ink-50);}
.btn-ghost{background:transparent;color:var(--ink-600);padding:8px 12px;font-weight:500;border:none;}
.btn-ghost:hover{color:var(--ink-900);background:var(--ink-100);}
.chip{height:44px;width:44px;display:grid;place-items:center;border-radius:14px;background:var(--brand-50);color:var(--brand-600);}
.chip svg{width:20px;height:20px;}
.card{position:relative;border-radius:16px;border:1px solid var(--border);background:#fff;padding:22px;box-shadow:var(--shadow-soft);transition:all .3s var(--ease-out);}
.card-hover{border-color:var(--border-accent);box-shadow:var(--shadow-card-hover);transform:translateY(-4px);}
</style>
<script src="https://unpkg.com/lucide@0.288.0/dist/umd/lucide.min.js"></script></head><body>
<div class="lbl">Stat strip — gradient Space Grotesk numbers + ink-500 label</div>
<div style="display:grid;grid-template-columns:repeat(4,1fr);gap:20px;margin-top:6px;">
  <div>
    <div class="ds-gradient-text" style="font-family:var(--font-display);font-weight:700;font-size:46px;letter-spacing:-0.02em;line-height:1;">8+</div>
    <div style="margin-top:8px;font-size:13px;font-weight:500;color:var(--ink-500);">Code generators</div></div><div>
    <div class="ds-gradient-text" style="font-family:var(--font-display);font-weight:700;font-size:46px;letter-spacing:-0.02em;line-height:1;">31</div>
    <div style="margin-top:8px;font-size:13px;font-weight:500;color:var(--ink-500);">Peer-reviewed papers</div></div><div>
    <div class="ds-gradient-text" style="font-family:var(--font-display);font-weight:700;font-size:46px;letter-spacing:-0.02em;line-height:1;">23</div>
    <div style="margin-top:8px;font-size:13px;font-weight:500;color:var(--ink-500);">Researchers & engineers</div></div><div>
    <div class="ds-gradient-text" style="font-family:var(--font-display);font-weight:700;font-size:46px;letter-spacing:-0.02em;line-height:1;">2</div>
    <div style="margin-top:8px;font-size:13px;font-weight:500;color:var(--ink-500);">EU Horizon projects</div></div>
</div>
<script>lucide.createIcons();</script></body></html>
