<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Navigation Bar</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>html,body{margin:0;}body{width:700px;min-height:110px;box-sizing:border-box;padding:0;background:#fff;color:var(--fg1);font-family:var(--font-sans);}
.pad{padding:26px 28px;}
.lbl{font-family:var(--font-mono);font-size:11px;color:var(--fg3);margin-bottom:14px;}
</style>
<script src="https://unpkg.com/lucide@0.288.0/dist/umd/lucide.min.js"></script></head><body>
<div style="border-bottom:1px solid rgba(226,232,240,0.8);padding:0 24px;height:64px;display:flex;align-items:center;justify-content:space-between;background:rgba(255,255,255,0.8);backdrop-filter:blur(8px);">
  <div style="display:flex;align-items:center;gap:26px;">
    <img src="../assets/besser_logo.webp" style="height:34px;width:auto;" alt="BESSER">
    <nav style="display:flex;gap:4px;">
      <a style="padding:8px 12px;border-radius:8px;font-size:14px;font-weight:500;color:var(--brand-700);text-decoration:none;">Home</a><a style="padding:8px 12px;border-radius:8px;font-size:14px;font-weight:500;color:var(--ink-600);text-decoration:none;">Features</a><a style="padding:8px 12px;border-radius:8px;font-size:14px;font-weight:500;color:var(--ink-600);text-decoration:none;">Services</a>
      <a style="padding:8px 12px;border-radius:8px;font-size:14px;font-weight:500;color:var(--ink-600);display:inline-flex;align-items:center;gap:4px;">Research <i data-lucide="chevron-down" style="width:14px;height:14px;opacity:.6;"></i></a>
      <a style="padding:8px 12px;border-radius:8px;font-size:14px;font-weight:500;color:var(--ink-600);">Team</a>
    </nav>
  </div>
  <div style="display:flex;align-items:center;gap:10px;">
    <a style="height:38px;width:38px;display:grid;place-items:center;border-radius:8px;color:var(--ink-600);"><i data-lucide="github" style="width:20px;height:20px;"></i></a>
    <a style="background:var(--brand-600);color:#fff;padding:10px 18px;border-radius:14px;font-size:14px;font-weight:600;text-decoration:none;box-shadow:var(--shadow-soft);">Try BESSER</a>
  </div>
</div>
<script>lucide.createIcons();</script></body></html>
