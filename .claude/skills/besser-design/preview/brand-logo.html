<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Logo</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>html,body{margin:0;}body{width:700px;min-height:200px;box-sizing:border-box;padding:26px 28px;background:#fff;color:var(--fg1);font-family:var(--font-sans);}
.lbl{font-family:var(--font-mono);font-size:11px;color:var(--fg3);margin-bottom:14px;}
</style>
<script src="https://unpkg.com/lucide@0.288.0/dist/umd/lucide.min.js"></script></head><body>
<div class="lbl">Wordmark — UML class-box mark + feedback loop · "better software faster"</div>
<div style="display:flex;gap:16px;">
  <div style="flex:1;background:#fff;border:1px solid var(--border);border-radius:16px;display:grid;place-items:center;padding:24px;">
    <img src="../assets/besser_logo.webp" style="height:58px;width:auto;" alt="BESSER on light">
  </div>
  <div style="flex:1;background:var(--ink-900);border-radius:16px;display:grid;place-items:center;padding:24px;">
    <img src="../assets/besser_logo.webp" style="height:58px;width:auto;filter:brightness(0) invert(1);opacity:.92;" alt="BESSER on dark (knockout)">
  </div>
</div>
<div style="display:flex;justify-content:space-between;margin-top:10px;font-family:var(--font-mono);font-size:10px;color:var(--fg3);"><span>on light (primary)</span><span>knockout on ink-900</span></div><script>lucide.createIcons();</script></body></html>
